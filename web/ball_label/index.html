<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>rally-cut 공 라벨러</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: system-ui, sans-serif; }
  #bar { display:flex; gap:8px; align-items:center; padding:8px; flex-wrap:wrap; }
  #wrap { width:100%; background:#000; }
  canvas { display:block; width:100%; height:auto; touch-action:none; }
  button { font-size:16px; padding:10px 14px; border-radius:10px; border:1px solid #888; background:#222; color:#fff; }
  button.on { background:#16a34a; border-color:#16a34a; }
  .big { flex:1; min-width:88px; }
  #status { font-size:14px; opacity:.85; padding:0 8px 10px; }
  #file { font-size:14px; }
</style>
</head>
<body>
<div id="bar">
  <input id="file" type="file" accept=".json,application/json">
  <button id="prev" class="big">◀ 이전</button>
  <button id="next" class="big">다음 ▶</button>
  <button id="none" class="big">공없음</button>
  <button id="bounce" class="big">바운스</button>
  <button id="contact" class="big">타구</button>
  <button id="dl" class="big">CSV 저장</button>
</div>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="status">JSON을 불러오세요.</div>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
let data=null, idx=0, labels={}, key='', img=new Image();

function curF(){ return data.frames[idx].f; }
function lbl(){ const f=curF(); return labels[f] || (labels[f]={present:0,x:null,y:null,bounce:0,contact:0}); }
function touched(L){ return L.present||L.x!=null||L.bounce||L.contact; }

function ring(x,y,c,r){ ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.strokeStyle=c; ctx.lineWidth=3; ctx.stroke(); }
function status(){
  const L=lbl(); const n=Object.values(labels).filter(touched).length;
  $('status').textContent=`${idx+1}/${data.frames.length} (frame ${curF()}) · 라벨 ${n} · `
    +`present=${L.present} ${L.bounce?'바운스 ':''}${L.contact?'타구':''}`;
  $('bounce').classList.toggle('on', !!L.bounce);
  $('contact').classList.toggle('on', !!L.contact);
}
function draw(){
  if(!data) return;
  const fr=data.frames[idx];
  cv.width=data.w; cv.height=data.h;
  img.onload=()=>{
    ctx.drawImage(img,0,0,data.w,data.h);
    if(fr.seed) ring(fr.seed[0],fr.seed[1],'#facc15',6);   // 검출 시드(노랑)
    const L=labels[fr.f];
    if(L && L.present && L.x!=null) ring(L.x,L.y,'#22c55e',9); // 라벨(초록)
    status();
  };
  img.src='data:image/jpeg;base64,'+fr.jpg;
}
function save(){ if(key) localStorage.setItem(key, JSON.stringify(labels)); }

cv.addEventListener('pointerdown', e=>{
  if(!data) return;
  const r=cv.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*data.w, y=(e.clientY-r.top)/r.height*data.h;
  const L=lbl(); L.present=1; L.x=Math.round(x*10)/10; L.y=Math.round(y*10)/10;
  save(); draw();
});
$('none').onclick=()=>{ const L=lbl(); L.present=0; L.x=null; L.y=null; save(); draw(); };
$('bounce').onclick=()=>{ const L=lbl(); L.bounce=L.bounce?0:1; save(); draw(); };
$('contact').onclick=()=>{ const L=lbl(); L.contact=L.contact?0:1; save(); draw(); };
$('prev').onclick=()=>{ if(data){ idx=Math.max(0,idx-1); draw(); } };
$('next').onclick=()=>{ if(data){ idx=Math.min(data.frames.length-1,idx+1); draw(); } };

$('file').addEventListener('change', ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    data=JSON.parse(rd.result); idx=0;
    key='balllabels_'+(data.video||'vid');
    const saved=localStorage.getItem(key);
    labels = saved ? JSON.parse(saved) : {};
    draw();
  };
  rd.readAsText(f);
});

$('dl').onclick=()=>{
  if(!data) return;
  const rows=['frame,present,x,y,bounce,contact'];
  Object.keys(labels).map(Number).sort((a,b)=>a-b).forEach(f=>{
    const L=labels[f];
    if(!touched(L)) return;
    rows.push([f, L.present?1:0, L.x==null?'':L.x, L.y==null?'':L.y, L.bounce?1:0, L.contact?1:0].join(','));
  });
  const blob=new Blob([rows.join('\n')], {type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ball_gt_'+(data.video||'vid')+'.csv';
  a.click();
};
</script>
</body>
</html>
