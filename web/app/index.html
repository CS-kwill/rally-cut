<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>rally-cut V0.5</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; } /* .row{display:flex}가 hidden을 덮지 않도록 */
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px;
         max-width: 640px; margin-inline: auto; font-size: 16px;
         padding-bottom: env(safe-area-inset-bottom); }
  h1 { font-size: 1.1em; margin: 4px 0 8px; }
  h1 small { font-weight: 400; opacity: .6; }
  video { width: 100%; border-radius: 10px; background: #000; max-height: 40vh; }
  .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
  button { font-size: 16px; padding: 10px 16px; border-radius: 10px;
           border: 1px solid #8886; background: #2563eb; color: #fff; }
  button:disabled { opacity: .4; }
  button.aux { background: #6b7280; }
  input[type=file] { font-size: 14px; max-width: 100%; }
  #status { font-size: 14px; opacity: .85; min-height: 1.3em; margin: 6px 0; }
  #summary { font-size: 14px; font-weight: 600; margin: 6px 0; }
  ul { list-style: none; padding: 0; margin: 8px 0; }
  li { display: flex; align-items: center; gap: 8px; padding: 10px;
       border: 1px solid #8884; border-radius: 10px; margin-bottom: 6px; }
  li .cell { flex: 1; cursor: pointer; }
  li .dur { opacity: .6; margin-left: 8px; font-size: 14px; }
  li.drop { opacity: .55; }
  li.drop .cell { text-decoration: line-through; }
  li.active { border-color: #2563eb; border-width: 2px; }
  .toggle { min-width: 72px; padding: 8px 0; font-size: 14px; }
  li.keep .toggle { background: #16a34a; }
  li.drop .toggle { background: #6b7280; }
</style>
<script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
</head>
<body>
<h1>rally-cut <small>V0.5 — 분석·검수 (컷 출력은 다음 버전)</small></h1>

<input id="file" type="file" accept="video/*,audio/*">
<video id="video" controls playsinline hidden></video>

<div class="row">
  <button id="analyze" disabled>분석</button>
  <span id="summary"></span>
</div>
<div id="status"></div>

<ul id="list"></ul>

<div id="exportBar" class="row" hidden>
  <button id="dl" class="aux">cuts.csv 다운로드</button>
  <button id="share" class="aux">공유</button>
  <button id="copy" class="aux">복사</button>
</div>

<script type="module" src="js/main.js?v=2"></script>
</body>
</html>
